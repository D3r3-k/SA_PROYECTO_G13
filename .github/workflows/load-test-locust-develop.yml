name: Load test Locust develop cloud

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Modo de prueba: route-check no requiere usuarios; full-flow requiere usuarios reales de prueba"
        required: true
        default: "route-check"
        type: choice
        options:
          - route-check
          - full-flow
      users:
        description: "Usuarios concurrentes para carga ligera"
        required: false
        default: "20"
      spawn_rate:
        description: "Usuarios nuevos por segundo"
        required: false
        default: "2"
      run_time:
        description: "Duracion de la prueba, por ejemplo 3m o 5m"
        required: false
        default: "3m"
      target_host:
        description: "Opcional. URL cloud de develop. Si se deja vacio usa la IP publica de VM_FRONTEND_NAME"
        required: false
        default: ""

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAMESPACE: ghcr.io/d3r3-k/sa_proyecto_g13
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  GCP_ZONE: ${{ vars.GCP_ZONE }}
  VM_FRONTEND_NAME: ${{ vars.VM_FRONTEND_NAME }}
  VM_GATEWAY_NAME: ${{ vars.VM_GATEWAY_NAME }}
  VM_LOCUST_RUNNER_NAME: ${{ vars.VM_LOCUST_RUNNER_NAME }}
  LOCUST_CONTENT_IDS: ${{ vars.DEV_LOCUST_CONTENT_IDS || vars.LOCUST_CONTENT_IDS }}
  LOCUST_SEARCH_TERMS: ${{ vars.DEV_LOCUST_SEARCH_TERMS || vars.LOCUST_SEARCH_TERMS }}

jobs:
  build-locust-image:
    name: Build Locust image
    runs-on: ubuntu-latest
    environment: develop
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: meta
        run: echo "image=${IMAGE_NAMESPACE}/locust-load:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push Locust image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: tests/load/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.image }}

  run-locust-in-develop-vm:
    name: Run Locust against develop
    needs: build-locust-image
    runs-on: ubuntu-latest
    environment: develop
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure gcloud project
        run: gcloud config set project "${GCP_PROJECT_ID}"

      - name: Resolve develop target
        id: target
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ github.event.inputs.target_host }}" ]; then
            HOST="${{ github.event.inputs.target_host }}"
          else
            FRONTEND_PUBLIC_IP="$(gcloud compute instances describe "${VM_FRONTEND_NAME}" --zone="${GCP_ZONE}" --format='value(networkInterfaces[0].accessConfigs[0].natIP)')"
            HOST="http://${FRONTEND_PUBLIC_IP}"
          fi
          echo "host=${HOST}" >> "$GITHUB_OUTPUT"
          echo "Resolved develop host: ${HOST}"

      - name: Prepare Locust runtime files
        shell: bash
        env:
          LOCUST_USERS_CSV_SECRET: ${{ secrets.LOCUST_USERS_CSV }}
          LOCUST_PREMIUM_EMAIL: ${{ secrets.LOCUST_PREMIUM_EMAIL }}
          LOCUST_PREMIUM_PASSWORD: ${{ secrets.LOCUST_PREMIUM_PASSWORD }}
          LOCUST_STANDARD_EMAIL: ${{ secrets.LOCUST_STANDARD_EMAIL }}
          LOCUST_STANDARD_PASSWORD: ${{ secrets.LOCUST_STANDARD_PASSWORD }}
          LOCUST_BASIC_EMAIL: ${{ secrets.LOCUST_BASIC_EMAIL }}
          LOCUST_BASIC_PASSWORD: ${{ secrets.LOCUST_BASIC_PASSWORD }}
          LOCUST_ADMIN_EMAIL: ${{ secrets.LOCUST_ADMIN_EMAIL }}
          LOCUST_ADMIN_PASSWORD: ${{ secrets.LOCUST_ADMIN_PASSWORD }}
        run: |
          set -euo pipefail
          mkdir -p runtime-locust reports/locust

          if [ -n "${LOCUST_USERS_CSV_SECRET:-}" ]; then
            printf '%s\n' "${LOCUST_USERS_CSV_SECRET}" > runtime-locust/users.csv
          else
            cp tests/load/users.example.csv runtime-locust/users.csv
          fi

          if [ "${{ github.event.inputs.mode }}" = "full-flow" ]; then
            STRICT_AUTH="true"
            ENABLE_WS="true"
          else
            STRICT_AUTH="false"
            ENABLE_WS="false"
          fi

          cat > runtime-locust/locust.env <<EOF
          LOCUST_HOST=${{ steps.target.outputs.host }}
          LOCUST_MODE=${{ github.event.inputs.mode }}
          LOCUST_USERS=${{ github.event.inputs.users }}
          LOCUST_SPAWN_RATE=${{ github.event.inputs.spawn_rate }}
          LOCUST_RUN_TIME=${{ github.event.inputs.run_time }}
          LOCUST_USERS_FILE=/runtime/users.csv
          LOCUST_AUTO_SELECT_PROFILE=true
          LOCUST_STRICT_AUTH=${STRICT_AUTH}
          LOCUST_ENABLE_WS=${ENABLE_WS}
          LOCUST_CONTENT_IDS=${LOCUST_CONTENT_IDS:-}
          LOCUST_SEARCH_TERMS=${LOCUST_SEARCH_TERMS:-accion,drama,comedia,familia,aventura}
          LOCUST_PREMIUM_EMAIL=${LOCUST_PREMIUM_EMAIL:-}
          LOCUST_PREMIUM_PASSWORD=${LOCUST_PREMIUM_PASSWORD:-}
          LOCUST_STANDARD_EMAIL=${LOCUST_STANDARD_EMAIL:-}
          LOCUST_STANDARD_PASSWORD=${LOCUST_STANDARD_PASSWORD:-}
          LOCUST_BASIC_EMAIL=${LOCUST_BASIC_EMAIL:-}
          LOCUST_BASIC_PASSWORD=${LOCUST_BASIC_PASSWORD:-}
          LOCUST_ADMIN_EMAIL=${LOCUST_ADMIN_EMAIL:-}
          LOCUST_ADMIN_PASSWORD=${LOCUST_ADMIN_PASSWORD:-}
          EOF

          # Quitar espacios de indentacion del heredoc para que docker --env-file lo lea correctamente.
          sed -i 's/^          //' runtime-locust/locust.env

      - name: Run Locust from develop Compute Engine VM
        id: locust_run
        shell: bash
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          set -euo pipefail
          RUNNER_VM="${VM_LOCUST_RUNNER_NAME:-${VM_GATEWAY_NAME}}"
          REMOTE_DIR="/tmp/quetxal-locust-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          IMAGE="${{ needs.build-locust-image.outputs.image }}"
          echo "runner_vm=${RUNNER_VM}" >> "$GITHUB_OUTPUT"
          echo "remote_dir=${REMOTE_DIR}" >> "$GITHUB_OUTPUT"

          gcloud compute ssh "${RUNNER_VM}" \
          --zone="${GCP_ZONE}" \
          --tunnel-through-iap \
          --command="sudo rm -rf '${REMOTE_DIR}' && sudo mkdir -p '${REMOTE_DIR}/reports' && sudo chmod -R 777 '${REMOTE_DIR}'"

          gcloud compute scp runtime-locust/users.csv "${RUNNER_VM}:${REMOTE_DIR}/users.csv" \
            --zone="${GCP_ZONE}" \
            --tunnel-through-iap

          gcloud compute ssh "${RUNNER_VM}" \
            --zone="${GCP_ZONE}" \
            --tunnel-through-iap \
            --command="sudo chmod -R 777 '${REMOTE_DIR}'"

          set +e
          gcloud compute ssh "${RUNNER_VM}" \
            --zone="${GCP_ZONE}" \
            --tunnel-through-iap \
            --command="cd '${REMOTE_DIR}' && echo '${GHCR_TOKEN}' | sudo docker login ghcr.io -u '${GHCR_USERNAME}' --password-stdin && sudo docker pull '${IMAGE}' && sudo docker run --rm --name 'locust-develop-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}' --env-file '${REMOTE_DIR}/locust.env' -v '${REMOTE_DIR}/reports:/reports' -v '${REMOTE_DIR}/users.csv:/runtime/users.csv:ro' --entrypoint sh '${IMAGE}' -c 'locust -f /mnt/locust/locustfile.py --host=\"\$LOCUST_HOST\" --headless -u \"\${LOCUST_USERS:-20}\" -r \"\${LOCUST_SPAWN_RATE:-2}\" --run-time \"\${LOCUST_RUN_TIME:-3m}\" --html /reports/locust-report.html --csv /reports/locust --exit-code-on-error 1'" \
            2>&1 | tee reports/locust/locust-develop-run.log
          RUN_STATUS=${PIPESTATUS[0]}
          set -e

          gcloud compute scp --recurse "${RUNNER_VM}:${REMOTE_DIR}/reports" reports/locust/develop \
            --zone="${GCP_ZONE}" \
            --tunnel-through-iap || true

          if [ "${RUN_STATUS}" != "0" ]; then
            echo "La prueba Locust develop no finalizo correctamente. Revisar reports/locust/locust-develop-run.log" >&2
            exit "${RUN_STATUS}"
          fi

      - name: Cleanup remote Locust files
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          RUNNER_VM="${VM_LOCUST_RUNNER_NAME:-${VM_GATEWAY_NAME}}"
          REMOTE_DIR="/tmp/quetxal-locust-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          gcloud compute ssh "${RUNNER_VM}" \
            --zone="${GCP_ZONE}" \
            --tunnel-through-iap \
            --command="rm -rf '${REMOTE_DIR}'" || true

      - name: Upload Locust develop report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: locust-develop-cloud-report
          path: reports/locust
