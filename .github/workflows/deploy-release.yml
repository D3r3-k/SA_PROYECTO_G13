name: Deploy release to GKE

on:
  pull_request:
    types: [closed]
    branches:
      - 'release/**'
      - 'test/**'
    paths:
      - 'apps/**'
      - 'services/**'
      - 'proto/**'
      - 'scripts/**'
      - 'deploy/release/**'
      - '!**/*.md'
      - '!**/docs/**'
  workflow_dispatch:

concurrency:
  group: deploy-release
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAMESPACE: ghcr.io/d3r3-k/sa_proyecto_g13
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  GO_VERSION: "1.22"
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  GCP_ZONE: ${{ vars.GCP_ZONE }}
  GKE_CLUSTER_NAME: ${{ vars.GKE_CLUSTER_NAME }}
  GKE_NAMESPACE: ${{ vars.GKE_NAMESPACE }}
  GCS_BUCKET_NAME: ${{ vars.GCS_BUCKET_NAME }}
  INGRESS_IP_NAME: ${{ vars.INGRESS_IP_NAME }}
  CLOUD_SQL_INSTANCE: ${{ vars.CLOUD_SQL_INSTANCE }}
  REDIS_INSTANCE: ${{ vars.REDIS_INSTANCE }}

jobs:
  # ─── Pruebas unitarias e integración ────────────────────────────────────────

  test-payment-gateway:
    name: "payment-gateway-service (Python)"
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       contains(github.event.pull_request.labels.*.name, 'deploy'))
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/payment-gateway-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Instalar dependencias de prueba
        run: |
          pip install --upgrade pip
          pip install pytest pytest-asyncio>=0.21 pytest-cov grpcio python-dotenv "redis>=5.0.0"
      - name: Ejecutar pruebas
        run: pytest tests/ --cov=src --cov-report=term-missing --cov-report=xml --cov-fail-under=75 -v
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-payment-gateway
          path: services/payment-gateway-service/coverage.xml

  test-fx-service:
    name: "fx-service (Python)"
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       contains(github.event.pull_request.labels.*.name, 'deploy'))
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/fx-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Instalar dependencias de prueba
        run: |
          pip install --upgrade pip
          pip install pytest pytest-asyncio>=0.21 pytest-cov grpcio "redis>=4.6.0" httpx python-dotenv
      - name: Ejecutar pruebas
        run: pytest tests/ --cov=src --cov-report=term-missing --cov-report=xml --cov-fail-under=75 -v
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-fx-service
          path: services/fx-service/coverage.xml

  test-engagement-service:
    name: "engagement-service (Python)"
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       contains(github.event.pull_request.labels.*.name, 'deploy'))
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/engagement-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Instalar dependencias de prueba
        run: |
          pip install --upgrade pip
          pip install pytest pytest-asyncio>=0.21 pytest-cov grpcio psycopg2-binary python-dotenv protobuf "redis>=5.0.0"
      - name: Ejecutar pruebas
        run: pytest tests/ --cov=src --cov-report=term-missing --cov-report=xml --cov-fail-under=75 -v
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-engagement-service
          path: services/engagement-service/coverage.xml

  validate-recommendation-service:
    name: "recommendation-service (Python)"
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       contains(github.event.pull_request.labels.*.name, 'deploy'))
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/recommendation-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: services/recommendation-service/requirements.txt
      - name: Instalar dependencias y validar codigo
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          python -m compileall src

  test-subscription-service:
    name: "subscription-service (Python)"
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       contains(github.event.pull_request.labels.*.name, 'deploy'))
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/subscription-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Instalar dependencias de prueba
        run: |
          pip install --upgrade pip
          pip install pytest pytest-asyncio>=0.21 pytest-cov grpcio psycopg2-binary "redis>=5.0.0" python-dotenv pydantic
      - name: Ejecutar pruebas
        run: pytest tests/ --cov=src --cov-report=term-missing --cov-report=xml --cov-fail-under=75 -v
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-subscription-service
          path: services/subscription-service/coverage.xml

  test-notification-service:
    name: "notification-service (Python)"
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       contains(github.event.pull_request.labels.*.name, 'deploy'))
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/notification-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Instalar dependencias de prueba
        run: |
          pip install --upgrade pip
          pip install pytest pytest-asyncio>=0.21 pytest-cov grpcio "redis>=5.0.0" aiosmtplib python-dotenv
      - name: Ejecutar pruebas
        run: pytest tests/ --cov=src --cov-report=term-missing --cov-report=xml --cov-fail-under=75 -v
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-notification-service
          path: services/notification-service/coverage.xml

  test-identity-service:
    name: "identity-service (TypeScript)"
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       contains(github.event.pull_request.labels.*.name, 'deploy'))
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/identity-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: services/identity-service/package-lock.json
      - name: Instalar dependencias
        run: npm ci
      - name: Ejecutar pruebas con cobertura
        run: npm test -- --coverage --coverageThreshold='{"global":{"lines":75}}' --passWithNoTests
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-identity-service
          path: services/identity-service/coverage/

  test-api-gateway:
    name: "api-gateway (TypeScript)"
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       contains(github.event.pull_request.labels.*.name, 'deploy'))
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/api-gateway/package-lock.json
      - name: Instalar dependencias
        run: npm ci
      - name: Ejecutar pruebas con cobertura
        run: npm test -- --coverage --coverageThreshold='{"global":{"lines":75}}' --passWithNoTests
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-api-gateway
          path: apps/api-gateway/coverage/

  test-catalog-service:
    name: "catalog-service (Go)"
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       contains(github.event.pull_request.labels.*.name, 'deploy'))
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/catalog-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: services/catalog-service/go.sum
      - name: Ejecutar pruebas
        run: go test ./internal/service/... -v -coverprofile=coverage.out -covermode=atomic
      - name: Verificar cobertura >= 75%
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Cobertura total: ${COVERAGE}%"
          python3 -c "
          pct = float('${COVERAGE}')
          print(f'Cobertura: {pct}%')
          exit(0 if pct >= 75 else 1)
          "
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-catalog-service
          path: services/catalog-service/coverage.out

  build-web:
    name: "web (build)"
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       contains(github.event.pull_request.labels.*.name, 'deploy'))
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Instalar dependencias y compilar
        run: |
          npm ci
          npm run build

  # ─── FIN: Pruebas unitarias e integración ──────────────────────────────────
  # Los jobs anteriores (test-* + build-web) son el gate de calidad.
  # Si cualquiera falla, backup-cloud-sql no arranca y el pipeline se detiene.

  # ─── INICIO: Deploy ─────────────────────────────────────────────────────────

  backup-cloud-sql:
    name: Backup Cloud SQL
    runs-on: ubuntu-latest
    environment: release
    needs:
      - test-payment-gateway
      - test-fx-service
      - test-engagement-service
      - validate-recommendation-service
      - test-subscription-service
      - test-notification-service
      - test-identity-service
      - test-api-gateway
      - test-catalog-service
      - build-web

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure gcloud project
        run: gcloud config set project "${GCP_PROJECT_ID}"

      - name: Export operational databases
        shell: bash
        run: |
          set -euo pipefail

          backup_prefix="gs://${GCS_BUCKET_NAME}/backups/${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          for database in identity_db subscription_db catalog_db engagement_db
          do
            gcloud sql export sql ${{ env.CLOUD_SQL_INSTANCE }} "${backup_prefix}/${database}.sql" \
              --database="${database}" \
              --quiet
          done

  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest
    environment: release
    needs: backup-cloud-sql
    strategy:
      fail-fast: true
      matrix:
        include:
          - image: web
            context: ./apps/web
            dockerfile: ./apps/web/Dockerfile
          - image: api-gateway
            context: .
            dockerfile: ./apps/api-gateway/Dockerfile
          - image: identity-service
            context: .
            dockerfile: ./services/identity-service/Dockerfile
          - image: fx-service
            context: .
            dockerfile: ./services/fx-service/Dockerfile
          - image: subscription-service
            context: .
            dockerfile: ./services/subscription-service/Dockerfile
          - image: notification-service
            context: .
            dockerfile: ./services/notification-service/Dockerfile
          - image: catalog-service
            context: .
            dockerfile: ./services/catalog-service/Dockerfile
          - image: engagement-service
            context: .
            dockerfile: ./services/engagement-service/Dockerfile
          - image: recommendation-service
            context: .
            dockerfile: ./services/recommendation-service/Dockerfile
          - image: payment-gateway-service
            context: .
            dockerfile: ./services/payment-gateway-service/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Calculate Docker tags
        id: docker_tags
        shell: bash
        run: |
          # Nunca usar latest; se usa sha del commit y semver si aplica
          TAGS="${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:${{ github.sha }}"
          if [[ "${{ github.ref_name }}" =~ ^release/(v[0-9]+\.[0-9]+\.[0-9]+)$ ]] || [[ "${{ github.ref_name }}" =~ ^test/(v[0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            SEMANTIC_TAG="${BASH_REMATCH[1]}"
            TAGS="${TAGS},${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:${SEMANTIC_TAG}"
          fi
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.docker_tags.outputs.tags }}

  migrate-databases:
    name: Migrar DBs
    runs-on: ubuntu-latest
    environment: release
    needs: build-and-push
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure gcloud project
        run: gcloud config set project "${GCP_PROJECT_ID}"

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin

      - name: Get GKE credentials
        run: gcloud container clusters get-credentials "${GKE_CLUSTER_NAME}" --region="${GCP_REGION}" --project="${GCP_PROJECT_ID}"

      - name: Run SQL Migrations via Ephemeral Pod
        shell: bash
        env:
          IDENTITY_DB_PASSWORD: ${{ secrets.IDENTITY_DB_PASSWORD }}
          CATALOG_DB_PASSWORD: ${{ secrets.CATALOG_DB_PASSWORD }}
          ENGAGEMENT_DB_PASSWORD: ${{ secrets.ENGAGEMENT_DB_PASSWORD }}
          SUBSCRIPTION_DB_PASSWORD: ${{ secrets.SUBSCRIPTION_DB_PASSWORD }}
        run: |
          set -euo pipefail

          CLOUD_SQL_PRIVATE_IP="$(gcloud sql instances describe ${{ env.CLOUD_SQL_INSTANCE }} --format='value(ipAddresses[0].ipAddress)')"

          kubectl create namespace "${GKE_NAMESPACE}" --dry-run=client -o yaml | kubectl apply -f -

          echo "Iniciando pod efimero db-migrator..."
          kubectl run db-migrator \
            --image=postgres:16-alpine \
            --namespace="${GKE_NAMESPACE}" \
            --restart=Never \
            --overrides='{"spec":{"terminationGracePeriodSeconds":0}}' \
            -- sleep 3600

          trap 'echo "Eliminando pod db-migrator..."; kubectl delete pod db-migrator --namespace="${GKE_NAMESPACE}" --ignore-not-found=true --grace-period=0 --force' EXIT

          echo "Esperando a que el pod db-migrator este listo..."
          kubectl wait --for=condition=Ready pod/db-migrator --namespace="${GKE_NAMESPACE}" --timeout=60s

          echo "Copiando archivos de migracion al pod..."
          kubectl cp services/ db-migrator:/tmp/services --namespace="${GKE_NAMESPACE}"

          echo "Migrando identity_db..."
          kubectl exec db-migrator --namespace="${GKE_NAMESPACE}" -- \
            sh -c 'export PGPASSWORD='"${IDENTITY_DB_PASSWORD}"'; for dir in 01_extensions 02_tables 03_functions 04_views 05_procedures 06_triggers; do
              for f in $(ls /tmp/services/identity-service/migrations/$dir/*.sql | sort); do
                echo "  -> Aplicando $f"
                psql -h '"${CLOUD_SQL_PRIVATE_IP}"' -p 5432 -U identity_user -d identity_db -v ON_ERROR_STOP=1 -f "$f"
              done
            done'

          echo "Migrando catalog_db..."
          kubectl exec db-migrator --namespace="${GKE_NAMESPACE}" -- \
            sh -c 'export PGPASSWORD='"${CATALOG_DB_PASSWORD}"'; psql -h '"${CLOUD_SQL_PRIVATE_IP}"' -p 5432 -U catalog_user -d catalog_db -v ON_ERROR_STOP=1 -f /tmp/services/catalog-service/migrations/001_init.sql'

          echo "Migrando engagement_db..."
          kubectl exec db-migrator --namespace="${GKE_NAMESPACE}" -- \
            sh -c 'export PGPASSWORD='"${ENGAGEMENT_DB_PASSWORD}"'; psql -h '"${CLOUD_SQL_PRIVATE_IP}"' -p 5432 -U engagement_user -d engagement_db -v ON_ERROR_STOP=1 -f /tmp/services/engagement-service/migrations/001_init.sql'

          echo "Migrando subscription_db..."
          kubectl exec db-migrator --namespace="${GKE_NAMESPACE}" -- \
            sh -c 'export PGPASSWORD='"${SUBSCRIPTION_DB_PASSWORD}"'; psql -h '"${CLOUD_SQL_PRIVATE_IP}"' -p 5432 -U subscription_user -d subscription_db -v ON_ERROR_STOP=1 -f /tmp/services/subscription-service/migrations/001_init.sql'

  deploy-application:
    name: Deploy Application
    runs-on: ubuntu-latest
    environment: release
    needs: migrate-databases

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure gcloud project
        run: gcloud config set project "${GCP_PROJECT_ID}"

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin

      - name: Get GKE credentials
        run: gcloud container clusters get-credentials "${GKE_CLUSTER_NAME}" --region="${GCP_REGION}" --project="${GCP_PROJECT_ID}"

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Install cert-manager
        run: |
          helm upgrade --install cert-manager oci://quay.io/jetstack/charts/cert-manager \
            --namespace cert-manager \
            --create-namespace \
            --version v1.20.2 \
            --set crds.enabled=true \
            --wait \
            --timeout 5m

      - name: Generate config and secrets
        shell: bash
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          IDENTITY_DB_PASSWORD: ${{ secrets.IDENTITY_DB_PASSWORD }}
          SUBSCRIPTION_DB_PASSWORD: ${{ secrets.SUBSCRIPTION_DB_PASSWORD }}
          CATALOG_DB_PASSWORD: ${{ secrets.CATALOG_DB_PASSWORD }}
          ENGAGEMENT_DB_PASSWORD: ${{ secrets.ENGAGEMENT_DB_PASSWORD }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          ACME_EMAIL: ${{ vars.ACME_EMAIL }}
          ACME_ENVIRONMENT: ${{ vars.ACME_ENVIRONMENT || 'staging' }}
        run: |
          set -euo pipefail

          CLOUD_SQL_PRIVATE_IP="$(gcloud sql instances describe ${{ env.CLOUD_SQL_INSTANCE }} --format='value(ipAddresses[0].ipAddress)')"
          REDIS_HOST="$(gcloud redis instances describe ${{ env.REDIS_INSTANCE }} --region="${GCP_REGION}" --format='value(host)')"
          REDIS_PORT="$(gcloud redis instances describe ${{ env.REDIS_INSTANCE }} --region="${GCP_REGION}" --format='value(port)')"
          INGRESS_IP="$(gcloud compute addresses describe "${INGRESS_IP_NAME}" --global --format='value(address)')"

          if [ -z "${ACME_EMAIL}" ]; then
            echo "[deploy-release.yml] Error: falta la variable ACME_EMAIL del environment release" >&2
            exit 1
          fi
          if [ "${ACME_ENVIRONMENT}" != "staging" ] && [ "${ACME_ENVIRONMENT}" != "production" ]; then
            echo "[deploy-release.yml] Error: ACME_ENVIRONMENT debe ser staging o production" >&2
            exit 1
          fi

          echo "INGRESS_IP=${INGRESS_IP}" >> "${GITHUB_ENV}"
          echo "ACME_ENVIRONMENT=${ACME_ENVIRONMENT}" >> "${GITHUB_ENV}"
          echo "TLS_SECRET_NAME=quetxal-tv-tls" >> "${GITHUB_ENV}"

          mkdir -p runtime-k8s
          sed \
            -e "s|__ACME_EMAIL__|${ACME_EMAIL}|g" \
            deploy/release/k8s/tls/cluster-issuers.yml > runtime-k8s/cluster-issuers.yml
          
          sed \
            -e "s|__INGRESS_IP__|${INGRESS_IP}|g" \
            -e "s|__ACME_ENVIRONMENT__|${ACME_ENVIRONMENT}|g" \
            deploy/release/k8s/tls/certificate.yml > runtime-k8s/certificate.yml
          sed \
            -e "s|__TLS_SECRET_NAME__|quetxal-tv-tls-production|g" \
            deploy/release/k8s/ingress.yml > runtime-k8s/ingress.yml


          kubectl create namespace "${GKE_NAMESPACE}" --dry-run=client -o yaml | kubectl apply -f -

          # ConfigMap
          kubectl create configmap app-config \
            --namespace="${GKE_NAMESPACE}" \
            --from-literal=NODE_ENV=production \
            --from-literal=RUN_MIGRATIONS=false \
            --from-literal=FRONTEND_URL=https://${INGRESS_IP} \
            --from-literal=API_GATEWAY_PORT=3000 \
            --from-literal=WEB_PORT=80 \
            --from-literal=API_GATEWAY_UPSTREAM=api-gateway:3000 \
            --from-literal=COOKIE_NAME=access_token \
            --from-literal=COOKIE_SECURE=false \
            --from-literal=COOKIE_SAME_SITE=lax \
            --from-literal=JWT_EXPIRES_IN=1d \
            --from-literal=IDENTITY_GRPC_HOST=0.0.0.0 \
            --from-literal=IDENTITY_GRPC_PORT=50051 \
            --from-literal=FX_GRPC_PORT=50052 \
            --from-literal=SUBSCRIPTION_GRPC_PORT=50053 \
            --from-literal=NOTIFICATION_GRPC_PORT=50054 \
            --from-literal=CATALOG_GRPC_PORT=50055 \
            --from-literal=ENGAGEMENT_GRPC_PORT=50056 \
            --from-literal=PAYMENT_GRPC_PORT=50057 \
            --from-literal=RECOMMENDATION_GRPC_PORT=50058 \
            --from-literal=IDENTITY_GRPC_URL=identity-service:50051 \
            --from-literal=FX_GRPC_URL=fx-service:50052 \
            --from-literal=SUBSCRIPTION_GRPC_URL=subscription-service:50053 \
            --from-literal=NOTIFICATION_GRPC_URL=notification-service:50054 \
            --from-literal=CATALOG_GRPC_URL=catalog-service:50055 \
            --from-literal=ENGAGEMENT_GRPC_URL=engagement-service:50056 \
            --from-literal=PAYMENT_GRPC_URL=payment-gateway-service:50057 \
            --from-literal=RECOMMENDATION_GRPC_URL=recommendation-service:50058 \
            --from-literal=ADMIN_EMAILS="${{ vars.ADMIN_EMAILS }}" \
            --from-literal=IDENTITY_DB_HOST=${CLOUD_SQL_PRIVATE_IP} \
            --from-literal=IDENTITY_DB_PORT=5432 \
            --from-literal=IDENTITY_DB_NAME=identity_db \
            --from-literal=IDENTITY_DB_USER=identity_user \
            --from-literal=DB_HOST=${CLOUD_SQL_PRIVATE_IP} \
            --from-literal=DB_PORT=5432 \
            --from-literal=DB_NAME=identity_db \
            --from-literal=DB_USER=identity_user \
            --from-literal=ENGAGEMENT_DB_HOST=${CLOUD_SQL_PRIVATE_IP} \
            --from-literal=ENGAGEMENT_DB_PORT=5432 \
            --from-literal=ENGAGEMENT_DB_NAME=engagement_db \
            --from-literal=ENGAGEMENT_DB_USER=engagement_user \
            --from-literal=CATALOG_DB_HOST=${CLOUD_SQL_PRIVATE_IP} \
            --from-literal=CATALOG_DB_PORT=5432 \
            --from-literal=CATALOG_DB_NAME=catalog_db \
            --from-literal=CATALOG_DB_USER=catalog_user \
            --from-literal=REDIS_URL=redis://${REDIS_HOST}:${REDIS_PORT}/0 \
            --from-literal=NOTIFICATION_QUEUE_NAME=notification:queue \
            --from-literal=FX_CACHE_TTL=3600 \
            --from-literal=FX_API_BASE_URL=https://api.frankfurter.dev/v2 \
            --from-literal=GCS_BUCKET_NAME=${GCS_BUCKET_NAME} \
            --from-literal=GCS_PROJECT_ID=${GCP_PROJECT_ID} \
            --from-literal=GOOGLE_CLOUD_PROJECT=${GCP_PROJECT_ID} \
            --from-literal=GOOGLE_APPLICATION_CREDENTIALS=/app/secrets/gcp-service-account.json \
            --from-literal=GCS_SIGNED_UPLOAD_EXPIRES_MINUTES=15 \
            --from-literal=GCS_SIGNED_READ_EXPIRES_MINUTES=60 \
            --from-literal=GCS_ALLOWED_IMAGE_TYPES=image/jpeg,image/png,image/webp \
            --from-literal=GCS_ALLOWED_VIDEO_TYPES=video/mp4,video/webm \
            --from-literal=GCS_MAX_IMAGE_MB=10 \
            --from-literal=GCS_MAX_VIDEO_MB=1024 \
            --from-literal=PAYMENT_PROVIDER_NAME="QuetxalPay Sandbox" \
            --from-literal=PAYMENT_APPROVAL_DELAY_MS=500 \
            --from-literal=SMTP_PORT=587 \
            --from-literal=SMTP_STARTTLS=true \
            --dry-run=client -o yaml | kubectl apply -f -

          # App Secrets
          kubectl create secret generic app-secrets \
            --namespace="${GKE_NAMESPACE}" \
            --from-literal=JWT_SECRET="${JWT_SECRET}" \
            --from-literal=IDENTITY_DB_PASSWORD="${IDENTITY_DB_PASSWORD}" \
            --from-literal=SUBSCRIPTION_DB_PASSWORD="${SUBSCRIPTION_DB_PASSWORD}" \
            --from-literal=CATALOG_DB_PASSWORD="${CATALOG_DB_PASSWORD}" \
            --from-literal=ENGAGEMENT_DB_PASSWORD="${ENGAGEMENT_DB_PASSWORD}" \
            --from-literal=SMTP_HOST="${SMTP_HOST}" \
            --from-literal=SMTP_USERNAME="${SMTP_USERNAME}" \
            --from-literal=SMTP_PASSWORD="${SMTP_PASSWORD}" \
            --from-literal=SMTP_FROM="${SMTP_FROM}" \
            --dry-run=client -o yaml | kubectl apply -f -

          # Connection Secrets
          kubectl create secret generic connection-secrets \
            --namespace="${GKE_NAMESPACE}" \
            --from-literal=SUBSCRIPTION_DATABASE_URL="postgresql://subscription_user:${SUBSCRIPTION_DB_PASSWORD}@${CLOUD_SQL_PRIVATE_IP}:5432/subscription_db" \
            --from-literal=CATALOG_DATABASE_URL="postgresql://catalog_user:${CATALOG_DB_PASSWORD}@${CLOUD_SQL_PRIVATE_IP}:5432/catalog_db" \
            --from-literal=ENGAGEMENT_DATABASE_URL="postgresql://engagement_user:${ENGAGEMENT_DB_PASSWORD}@${CLOUD_SQL_PRIVATE_IP}:5432/engagement_db" \
            --dry-run=client -o yaml | kubectl apply -f -

          # GHCR Pull Secret
          kubectl create secret docker-registry ghcr-pull-secret \
            --namespace="${GKE_NAMESPACE}" \
            --docker-server=ghcr.io \
            --docker-username="${GHCR_USERNAME}" \
            --docker-password="${GHCR_TOKEN}" \
            --dry-run=client -o yaml | kubectl apply -f -

          # GCS Service Account
          cat > gcp-service-account.json <<'EOF'
          ${{ secrets.GCS_BACKEND_SERVICE_ACCOUNT_KEY }}
          EOF
          kubectl create secret generic gcs-service-account \
            --namespace="${GKE_NAMESPACE}" \
            --from-file=gcp-service-account.json=gcp-service-account.json \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Replace image tags in manifests
        shell: bash
        run: |
          VERSION_TAG="${{ github.sha }}"
          if [[ "${{ github.ref_name }}" =~ ^release/(v[0-9]+\.[0-9]+\.[0-9]+)$ ]] || [[ "${{ github.ref_name }}" =~ ^test/(v[0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            VERSION_TAG="${BASH_REMATCH[1]}"
          fi
          echo "Using version tag: ${VERSION_TAG}"
          sed -i "s|image: ${{ env.IMAGE_NAMESPACE }}/\(.*\):latest|image: ${{ env.IMAGE_NAMESPACE }}/\1:${VERSION_TAG}|g" deploy/release/k8s/deployments/*.yml

      - name: Apply Kubernetes manifests
        run: |
          set -euo pipefail
          kubectl apply -f deploy/release/k8s/backend-config.yml
          kubectl apply -f deploy/release/k8s/services/
          kubectl apply -f deploy/release/k8s/deployments/
          kubectl apply -f deploy/release/k8s/cronjobs/
          kubectl apply -f deploy/release/k8s/observability/prometheus.yml
          kubectl apply -f deploy/release/k8s/observability/grafana.yml
          kubectl apply -f deploy/release/k8s/observability/filebeat.yml

          if ! kubectl get ingress quetxal-tv-ingress --namespace="${GKE_NAMESPACE}" >/dev/null 2>&1; then
            kubectl apply -f deploy/release/k8s/ingress-bootstrap.yml
          fi

          kubectl apply -f runtime-k8s/cluster-issuers.yml
          kubectl apply -f runtime-k8s/certificate.yml

          kubectl wait \
            --for=condition=Ready \
            "certificate/quetxal-tv-ip" \
            --namespace="${GKE_NAMESPACE}" \
            --timeout=2m

          kubectl apply -f deploy/release/k8s/frontend-config.yml
          kubectl apply -f runtime-k8s/ingress.yml

          if [ "${ACME_ENVIRONMENT}" = "production" ]; then
            kubectl delete certificate quetxal-tv-ip-staging --namespace="${GKE_NAMESPACE}" --ignore-not-found
            kubectl delete secret quetxal-tv-tls-staging --namespace="${GKE_NAMESPACE}" --ignore-not-found
          fi

          for deployment in web api-gateway identity-service fx-service subscription-service notification-service catalog-service engagement-service recommendation-service payment-gateway-service
          do
            if ! kubectl rollout status deployment/${deployment} -n "${GKE_NAMESPACE}" --timeout=600s; then
              kubectl rollout undo deployment/${deployment} -n "${GKE_NAMESPACE}"
              exit 1
            fi
          done


  validate-release:
    name: Validacion
    runs-on: ubuntu-latest
    environment: release
    needs:
      - deploy-application

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4



      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Validate Ingress URL
        shell: bash
        env:
          ACME_ENVIRONMENT: ${{ vars.ACME_ENVIRONMENT || 'staging' }}
        run: |
          INGRESS_IP="$(gcloud compute addresses describe "${INGRESS_IP_NAME}" --global --format='value(address)')"
          
          echo "Waiting for Ingress to be ready at https://${INGRESS_IP} ..."
          for i in {1..45}; do
            if [ "${ACME_ENVIRONMENT}" = "production" ]; then
              CURL_TLS=(curl -kfsS)
            else
              CURL_TLS=(curl -kfsS)
            fi

            if "${CURL_TLS[@]}" "https://${INGRESS_IP}/healthz" >/dev/null; then
              echo "Smoke test passed!"
              HTTP_STATUS="$(curl -sS -o /dev/null -w '%{http_code}' "http://${INGRESS_IP}/")"
              if [ "${HTTP_STATUS}" = "301" ]; then
                exit 0
              fi
              echo "HTTPS responde, pero HTTP aun no redirige (estado ${HTTP_STATUS})."
            fi
            echo "Attempt $i failed. Retrying in 20s..."
            sleep 20
          done
          echo "Smoke test failed after 45 attempts."
          exit 1

      - name: Generate and push Git tag and Release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${{ github.ref_name }}" =~ ^release/(v[0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            TAG_NAME="${BASH_REMATCH[1]}"
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            if ! git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
              echo "Creating and pushing Git tag: ${TAG_NAME}"
              git tag "$TAG_NAME"
              git push origin "refs/tags/$TAG_NAME"
              
              echo "Creating GitHub Release..."
              gh release create "$TAG_NAME" --title "Release $TAG_NAME" --generate-notes
            else
              echo "Tag ${TAG_NAME} already exists."
            fi
          fi
