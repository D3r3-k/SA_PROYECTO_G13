---
- name: Deploy ELK Stack via Docker
  hosts: elk_server
  become: yes
  tasks:
    - name: Install dependencies
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
        state: present
        update_cache: yes

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/debian/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/debian {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker and Compose plugin
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Ensure ELK directory exists
      file:
        path: /opt/elk/logstash/pipeline
        state: directory
        mode: '0755'

    - name: Copy Logstash configuration
      copy:
        dest: /opt/elk/logstash/pipeline/logstash.conf
        content: |
          input {
            redis {
              host => "10.42.32.3"
              port => 6379
              data_type => "list"
              key => "log_audit_queue"
            }
          }
          filter {
            json {
              source => "message"
            }
          }
          output {
            elasticsearch {
              hosts => ["http://elasticsearch:9200"]
              index => "audit-logs-%{+YYYY.MM.dd}"
            }
          }

    - name: Create docker-compose.yml
      copy:
        dest: /opt/elk/docker-compose.yml
        content: |
          version: '3.8'
          services:
            elasticsearch:
              image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
              container_name: elasticsearch
              environment:
                - discovery.type=single-node
                - xpack.security.enabled=false
                - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
              ports:
                - "9200:9200"
              networks:
                - elk
              ulimits:
                memlock:
                  soft: -1
                  hard: -1
            
            kibana:
              image: docker.elastic.co/kibana/kibana:8.10.2
              container_name: kibana
              environment:
                - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
              ports:
                - "5601:5601"
              depends_on:
                - elasticsearch
              networks:
                - elk

            logstash:
              image: docker.elastic.co/logstash/logstash:8.10.2
              container_name: logstash
              environment:
                - "LS_JAVA_OPTS=-Xms512m -Xmx512m"
              volumes:
                - ./logstash/pipeline:/usr/share/logstash/pipeline
              depends_on:
                - elasticsearch
              networks:
                - elk

          networks:
            elk:
              driver: bridge

    - name: Ensure vm.max_map_count is set for Elasticsearch (OS Level)
      sysctl:
        name: vm.max_map_count
        value: 262144
        state: present
        sysctl_set: yes

    - name: Start ELK Stack via Docker Compose
      command: docker compose up -d
      args:
        chdir: /opt/elk
