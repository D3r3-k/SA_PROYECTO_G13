version: '3.8'

services:
  redis:
    image: redis:7
    container_name: sa_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - sa_net

  postgres:
    image: postgres:15
    container_name: sa_postgres
    environment:
      POSTGRES_USER: sa_user
      POSTGRES_PASSWORD: sa_pass
      POSTGRES_DB: sa_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - sa_net

  fx-service:
    build:
      context: ../services/fx-service
      dockerfile: Dockerfile
    container_name: sa_fx_service
    env_file:
      - ../.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://sa_user:sa_pass@postgres:5432/sa_db
    ports:
      - "8001:8000"
    depends_on:
      - redis
      - postgres
    networks:
      - sa_net

  subscription-service:
    build:
      context: ../services/subscription-service
      dockerfile: Dockerfile
    container_name: sa_subscription_service
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql://sa_user:sa_pass@postgres:5432/sa_db
    ports:
      - "8002:8000"
    depends_on:
      - postgres
    networks:
      - sa_net

  notification-service:
    build:
      context: ../services/notification-service
      dockerfile: Dockerfile
    container_name: sa_notification_service
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql://sa_user:sa_pass@postgres:5432/sa_db
    ports:
      - "8003:8000"
    depends_on:
      - postgres
    networks:
      - sa_net

  identity-db:
    image: postgres:16-alpine
    container_name: identity-db
    environment:
      POSTGRES_DB: identity_db
      POSTGRES_USER: identity_user
      POSTGRES_PASSWORD: identity_password
    volumes:
      - identity_db_data:/var/lib/postgresql/data
      - ../services/identity-service/migrations:/docker-entrypoint-initdb.d
    networks:
      - sa_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U identity_user -d identity_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  identity-service:
    build:
      context: ..
      dockerfile: services/identity-service/Dockerfile
    container_name: identity-service
    env_file:
      - ../services/identity-service/.env
    depends_on:
      identity-db:
        condition: service_healthy
    networks:
      - sa_net

  api-gateway:
    build:
      context: ..
      dockerfile: apps/api-gateway/Dockerfile
    container_name: api-gateway
    env_file:
      - ../apps/api-gateway/.env
    ports:
      - "3000:3000"
    depends_on:
      - identity-service
    networks:
      - sa_net

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    container_name: sa_web
    ports:
      - "8080:80"
    depends_on:
      - api-gateway
    networks:
      - sa_net

volumes:
  redis_data:
  pgdata:
  identity_db_data:

networks:
  sa_net:
    driver: bridge