version: "3.8"

services:
  redis:
    image: redis:7
    container_name: sa_redis
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - sa_net

  identity-db:
    image: postgres:16-alpine
    container_name: identity-db
    environment:
      POSTGRES_DB: ${IDENTITY_DB_NAME}
      POSTGRES_USER: ${IDENTITY_DB_USER}
      POSTGRES_PASSWORD: ${IDENTITY_DB_PASSWORD}
    expose:
      - "5432"
    volumes:
      - identity_db_data:/var/lib/postgresql/data
      - ../services/identity-service/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${IDENTITY_DB_USER} -d ${IDENTITY_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sa_net

  subscription-db:
    image: postgres:15
    container_name: sa_subscription_db
    environment:
      POSTGRES_USER: ${SUBSCRIPTION_DB_USER}
      POSTGRES_PASSWORD: ${SUBSCRIPTION_DB_PASSWORD}
      POSTGRES_DB: ${SUBSCRIPTION_DB_NAME}
    expose:
      - "5432"
    volumes:
      - subscription_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SUBSCRIPTION_DB_USER} -d ${SUBSCRIPTION_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - sa_net

  catalog-db:
    image: postgres:16-alpine
    container_name: catalog-db
    environment:
      POSTGRES_DB: ${CATALOG_DB_NAME}
      POSTGRES_USER: ${CATALOG_DB_USER}
      POSTGRES_PASSWORD: ${CATALOG_DB_PASSWORD}
    expose:
      - "5432"
    volumes:
      - catalog_pgdata:/var/lib/postgresql/data
      - ../services/catalog-service/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CATALOG_DB_USER} -d ${CATALOG_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sa_net

  engagement-db:
    image: postgres:16-alpine
    container_name: engagement-db
    environment:
      POSTGRES_DB: ${ENGAGEMENT_DB_NAME}
      POSTGRES_USER: ${ENGAGEMENT_DB_USER}
      POSTGRES_PASSWORD: ${ENGAGEMENT_DB_PASSWORD}
    expose:
      - "5432"
    volumes:
      - engagement_pgdata:/var/lib/postgresql/data
      - ../services/engagement-service/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ENGAGEMENT_DB_USER} -d ${ENGAGEMENT_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sa_net

  identity-service:
    build:
      context: ..
      dockerfile: services/identity-service/Dockerfile
    container_name: identity-service
    environment:
      NODE_ENV: ${NODE_ENV}
      IDENTITY_GRPC_HOST: ${IDENTITY_GRPC_HOST}
      IDENTITY_GRPC_PORT: ${IDENTITY_GRPC_PORT}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      DB_HOST: ${IDENTITY_DB_HOST}
      DB_PORT: ${IDENTITY_DB_PORT}
      DB_NAME: ${IDENTITY_DB_NAME}
      DB_USER: ${IDENTITY_DB_USER}
      DB_PASSWORD: ${IDENTITY_DB_PASSWORD}
      REDIS_URL: ${REDIS_URL}
      NOTIFICATION_QUEUE_NAME: ${NOTIFICATION_QUEUE_NAME}
    expose:
      - "${IDENTITY_GRPC_PORT}"
    depends_on:
      redis:
        condition: service_healthy
      identity-db:
        condition: service_healthy
    networks:
      - sa_net

  fx-service:
    build:
      context: ..
      dockerfile: services/fx-service/Dockerfile
    container_name: sa_fx_service
    environment:
      REDIS_URL: ${REDIS_URL}
      FX_CACHE_TTL: ${FX_CACHE_TTL}
      FX_API_BASE_URL: ${FX_API_BASE_URL}
    expose:
      - "${FX_GRPC_PORT}"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - sa_net

  subscription-service:
    build:
      context: ..
      dockerfile: services/subscription-service/Dockerfile
    container_name: sa_subscription_service
    environment:
      DATABASE_URL: ${SUBSCRIPTION_DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      NOTIFICATION_QUEUE_NAME: ${NOTIFICATION_QUEUE_NAME}
    expose:
      - "${SUBSCRIPTION_GRPC_PORT}"
    depends_on:
      redis:
        condition: service_healthy
      subscription-db:
        condition: service_healthy
    networks:
      - sa_net

  catalog-service:
    build:
      context: ..
      dockerfile: services/catalog-service/Dockerfile
    container_name: catalog-service
    environment:
      CATALOG_GRPC_PORT: ${CATALOG_GRPC_PORT}
      DATABASE_URL: ${CATALOG_DATABASE_URL}
      ARCHIVE_METADATA_BASE_URL: ${ARCHIVE_METADATA_BASE_URL:-https://archive.org/metadata}
      ARCHIVE_DOWNLOAD_BASE_URL: ${ARCHIVE_DOWNLOAD_BASE_URL:-https://archive.org/download}
      ARCHIVE_IMAGE_BASE_URL: ${ARCHIVE_IMAGE_BASE_URL:-https://archive.org/services/img}
      ARCHIVE_MOVIE_IDENTIFIERS: ${ARCHIVE_MOVIE_IDENTIFIERS:-charlie-chaplin-the-champion-1915,charliechaplin_theimmigrant_20190819,night_of_the_living_dead,TheGeneral,Nosferatu1922}
      ARCHIVE_SERIES_IDENTIFIER: ${ARCHIVE_SERIES_IDENTIFIER:-BarbecueForTwo1960}
      ARCHIVE_SERIES_IDENTIFIERS: ${ARCHIVE_SERIES_IDENTIFIERS:-BarbecueForTwo1960,Popeye_forPresident,popeye-meets-ali-baba-1937,PopeyePopeyeTheSailorMeetsSindbadTheSailor1936,PopeyeAncientFistory,popeye-private-eye-popeye-1954,popeye-little-sweepea-1936,popeye-greek-mirthology-1954,popeye-i-dont-scare-1956,popeye-spree-lunch-1957}
      ARCHIVE_SERIES_EPISODE_IDENTIFIERS: ${ARCHIVE_SERIES_EPISODE_IDENTIFIERS:-}
      ARCHIVE_SERIES_TITLE: ${ARCHIVE_SERIES_TITLE:-Serie Internet Archive}
      ARCHIVE_MOVIE_TARGET: ${ARCHIVE_MOVIE_TARGET:-5}
      ARCHIVE_SERIES_TARGET: ${ARCHIVE_SERIES_TARGET:-10}
      ARCHIVE_SERIES_EPISODE_LIMIT: ${ARCHIVE_SERIES_EPISODE_LIMIT:-15}
      ARCHIVE_ALLOW_FALLBACK: ${ARCHIVE_ALLOW_FALLBACK:-false}
    expose:
      - "${CATALOG_GRPC_PORT}"
    depends_on:
      catalog-db:
        condition: service_healthy
    networks:
      - sa_net

  engagement-service:
    build:
      context: ..
      dockerfile: services/engagement-service/Dockerfile
    container_name: engagement-service
    environment:
      DATABASE_URL: ${ENGAGEMENT_DATABASE_URL}
    expose:
      - "${ENGAGEMENT_GRPC_PORT}"
    depends_on:
      engagement-db:
        condition: service_healthy
    networks:
      - sa_net

  notification-service:
    build:
      context: ..
      dockerfile: services/notification-service/Dockerfile
    container_name: sa_notification_service
    environment:
      REDIS_URL: ${REDIS_URL}
      NOTIFICATION_QUEUE_NAME: ${NOTIFICATION_QUEUE_NAME}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      SMTP_STARTTLS: ${SMTP_STARTTLS}
    expose:
      - "50054"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - sa_net

  api-gateway:
    build:
      context: ..
      dockerfile: apps/api-gateway/Dockerfile
    container_name: api-gateway
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${API_GATEWAY_PORT}
      FRONTEND_URL: ${FRONTEND_URL}
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_NAME: ${COOKIE_NAME}
      COOKIE_SECURE: ${COOKIE_SECURE}
      COOKIE_SAME_SITE: ${COOKIE_SAME_SITE}
      IDENTITY_GRPC_URL: ${IDENTITY_GRPC_URL}
      FX_GRPC_URL: ${FX_GRPC_URL}
      SUBSCRIPTION_GRPC_URL: ${SUBSCRIPTION_GRPC_URL}
      CATALOG_GRPC_URL: ${CATALOG_GRPC_URL}
      ENGAGEMENT_GRPC_URL: ${ENGAGEMENT_GRPC_URL}
    ports:
      - "${API_GATEWAY_PORT}:${API_GATEWAY_PORT}"
    depends_on:
      - identity-service
      - fx-service
      - subscription-service
      - catalog-service
      - engagement-service
    networks:
      - sa_net

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    container_name: sa_web
    ports:
      - "${WEB_PORT}:80"
    depends_on:
      - api-gateway
    networks:
      - sa_net

volumes:
  redis_data:
  identity_db_data:
  subscription_pgdata:
  catalog_pgdata:
  engagement_pgdata:

networks:
  sa_net:
    driver: bridge