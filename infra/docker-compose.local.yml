services:
  identity-db:
    image: postgres:16-alpine
    container_name: identity-db
    environment:
      POSTGRES_DB: identity_db
      POSTGRES_USER: identity_user
      POSTGRES_PASSWORD: identity_password
    ports:
      - "5432:5432"
    volumes:
      - identity_db_data:/var/lib/postgresql/data
      - ../services/identity-service/migrations:/docker-entrypoint-initdb.d
    networks:
      - sa-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U identity_user -d identity_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  identity-service:
    build:
      context: ..
      dockerfile: services/identity-service/Dockerfile
    container_name: identity-service
    env_file:
      - ../services/identity-service/.env.example
    ports:
      - "50051:50051"
    depends_on:
      identity-db:
        condition: service_healthy
    networks:
      - sa-network

  api-gateway:
    build:
      context: ..
      dockerfile: apps/api-gateway/Dockerfile
    container_name: api-gateway
    env_file:
      - ../apps/api-gateway/.env.example
    ports:
      - "3000:3000"
    depends_on:
      - identity-service
    networks:
      - sa-network

volumes:
  identity_db_data:

networks:
  sa-network:
    driver: bridge