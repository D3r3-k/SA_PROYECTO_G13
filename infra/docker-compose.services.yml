services:
  redis:
    image: redis:7
    container_name: sa_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - sa_services_net

  identity-service:
    build:
      context: ..
      dockerfile: services/identity-service/Dockerfile
    container_name: identity-service
    restart: unless-stopped
    env_file:
      - ./.env.gcp
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      IDENTITY_GRPC_HOST: 0.0.0.0
      IDENTITY_GRPC_PORT: ${IDENTITY_GRPC_PORT:-50051}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      DB_HOST: ${IDENTITY_DB_HOST:?IDENTITY_DB_HOST is required}
      DB_PORT: ${IDENTITY_DB_PORT:-5432}
      DB_NAME: ${IDENTITY_DB_NAME:?IDENTITY_DB_NAME is required}
      DB_USER: ${IDENTITY_DB_USER:?IDENTITY_DB_USER is required}
      DB_PASSWORD: ${IDENTITY_DB_PASSWORD:?IDENTITY_DB_PASSWORD is required}
      REDIS_URL: redis://redis:6379/0
      NOTIFICATION_QUEUE_NAME: ${NOTIFICATION_QUEUE_NAME:-notification:queue}
    ports:
      - "${IDENTITY_GRPC_PORT:-50051}:50051"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - sa_services_net

  fx-service:
    build:
      context: ..
      dockerfile: services/fx-service/Dockerfile
    container_name: sa_fx_service
    restart: unless-stopped
    env_file:
      - ./.env.gcp
    environment:
      REDIS_URL: redis://redis:6379/0
      FX_CACHE_TTL: ${FX_CACHE_TTL:-3600}
      FX_API_BASE_URL: ${FX_API_BASE_URL:-https://api.frankfurter.dev/v2}
    ports:
      - "${FX_GRPC_PORT:-50052}:50052"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - sa_services_net

  subscription-service:
    build:
      context: ..
      dockerfile: services/subscription-service/Dockerfile
    container_name: sa_subscription_service
    restart: unless-stopped
    env_file:
      - ./.env.gcp
    environment:
      DATABASE_URL: ${SUBSCRIPTION_DATABASE_URL:?SUBSCRIPTION_DATABASE_URL is required}
      REDIS_URL: redis://redis:6379/0
      NOTIFICATION_QUEUE_NAME: ${NOTIFICATION_QUEUE_NAME:-notification:queue}
    ports:
      - "${SUBSCRIPTION_GRPC_PORT:-50053}:50053"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - sa_services_net

  notification-service:
    build:
      context: ..
      dockerfile: services/notification-service/Dockerfile
    container_name: sa_notification_service
    restart: unless-stopped
    env_file:
      - ./.env.gcp
    environment:
      REDIS_URL: redis://redis:6379/0
      NOTIFICATION_QUEUE_NAME: ${NOTIFICATION_QUEUE_NAME:-notification:queue}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-no-reply@quetxaltv.com}
      SMTP_STARTTLS: ${SMTP_STARTTLS:-true}
    ports:
      - "${NOTIFICATION_GRPC_PORT:-50054}:50054"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - sa_services_net

  catalog-service:
    build:
      context: ..
      dockerfile: services/catalog-service/Dockerfile
    container_name: catalog-service
    restart: unless-stopped
    env_file:
      - ./.env.gcp
    environment:
      CATALOG_GRPC_PORT: ${CATALOG_GRPC_PORT:-50055}
      DATABASE_URL: ${CATALOG_DATABASE_URL:?CATALOG_DATABASE_URL is required}
      ARCHIVE_METADATA_BASE_URL: ${ARCHIVE_METADATA_BASE_URL:-https://archive.org/metadata}
      ARCHIVE_DOWNLOAD_BASE_URL: ${ARCHIVE_DOWNLOAD_BASE_URL:-https://archive.org/download}
      ARCHIVE_IMAGE_BASE_URL: ${ARCHIVE_IMAGE_BASE_URL:-https://archive.org/services/img}
      ARCHIVE_MOVIE_IDENTIFIERS: ${ARCHIVE_MOVIE_IDENTIFIERS:-charlie-chaplin-the-champion-1915,charliechaplin_theimmigrant_20190819,night_of_the_living_dead,TheGeneral,Nosferatu1922}
      ARCHIVE_SERIES_IDENTIFIER: ${ARCHIVE_SERIES_IDENTIFIER:-BarbecueForTwo1960}
      ARCHIVE_SERIES_IDENTIFIERS: ${ARCHIVE_SERIES_IDENTIFIERS:-BarbecueForTwo1960,Popeye_forPresident,popeye-meets-ali-baba-1937,PopeyePopeyeTheSailorMeetsSindbadTheSailor1936,PopeyeAncientFistory,popeye-private-eye-popeye-1954,popeye-little-sweepea-1936,popeye-greek-mirthology-1954,popeye-i-dont-scare-1956,popeye-spree-lunch-1957}
      ARCHIVE_SERIES_EPISODE_IDENTIFIERS: ${ARCHIVE_SERIES_EPISODE_IDENTIFIERS:-}
      ARCHIVE_SERIES_TITLE: ${ARCHIVE_SERIES_TITLE:-Serie Internet Archive}
      ARCHIVE_MOVIE_TARGET: ${ARCHIVE_MOVIE_TARGET:-5}
      ARCHIVE_SERIES_TARGET: ${ARCHIVE_SERIES_TARGET:-10}
      ARCHIVE_SERIES_EPISODE_LIMIT: ${ARCHIVE_SERIES_EPISODE_LIMIT:-15}
      ARCHIVE_ALLOW_FALLBACK: ${ARCHIVE_ALLOW_FALLBACK:-false}
    ports:
      - "${CATALOG_GRPC_PORT:-50055}:50055"
    networks:
      - sa_services_net

  engagement-service:
    build:
      context: ..
      dockerfile: services/engagement-service/Dockerfile
    container_name: engagement-service
    restart: unless-stopped
    env_file:
      - ./.env.gcp
    environment:
      DATABASE_URL: ${ENGAGEMENT_DATABASE_URL:?ENGAGEMENT_DATABASE_URL is required}
    ports:
      - "${ENGAGEMENT_GRPC_PORT:-50056}:50056"
    networks:
      - sa_services_net

  payment-gateway-service:
    build:
      context: ..
      dockerfile: services/payment-gateway-service/Dockerfile
    container_name: payment-gateway-service
    restart: unless-stopped
    env_file:
      - ./.env.gcp
    environment:
      PAYMENT_GRPC_PORT: ${PAYMENT_GRPC_PORT:-50057}
      PAYMENT_PROVIDER_NAME: ${PAYMENT_PROVIDER_NAME:-mock}
      PAYMENT_APPROVAL_DELAY_MS: ${PAYMENT_APPROVAL_DELAY_MS:-1500}
    ports:
      - "${PAYMENT_GRPC_PORT:-50057}:50057"
    networks:
      - sa_services_net

volumes:
  redis_data:

networks:
  sa_services_net:
    driver: bridge
