apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: quetxal-tv-ingress
  namespace: quetxal-tv-prod
  annotations:
    kubernetes.io/ingress.global-static-ip-name: prod-release-ingress-ip
    kubernetes.io/ingress.class: gce
    networking.gke.io/v1beta1.FrontendConfig: quetxal-tv-frontend-config
spec:
  tls:
    - secretName: __TLS_SECRET_NAME__
  rules:
    - http:
        paths:
          - path: /*
            pathType: ImplementationSpecific
            backend:
              service:
                name: web
                port:
                  number: 80
