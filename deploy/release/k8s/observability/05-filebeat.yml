---
apiVersion: beat.k8s.elastic.co/v1beta1
kind: Beat
metadata:
  name: quetxal-filebeat
  namespace: observability
spec:
  type: filebeat
  version: 9.4.2
  # DaemonSet para recolectar logs de todos los nodos
  daemonSet:
    podTemplate:
      spec:
        # Tolerations para ejecutar en TODOS los nodos, incluido el de observabilidad
        tolerations:
          - key: workload
            value: observability
            effect: NoSchedule
          - operator: Exists
            effect: NoExecute
          - operator: Exists
            effect: NoSchedule
        serviceAccountName: quetxal-filebeat
        automountServiceAccountToken: true
        terminationGracePeriodSeconds: 30
        dnsPolicy: ClusterFirstWithHostNet
        hostNetwork: true
        containers:
          - name: filebeat
            resources:
              requests:
                memory: 128Mi
                cpu: "100m"
              limits:
                memory: 256Mi
                cpu: "500m"
            securityContext:
              runAsUser: 0
            volumeMounts:
              - name: varlogcontainers
                mountPath: /var/log/containers
              - name: varlogpods
                mountPath: /var/log/pods
              - name: varlibdockercontainers
                mountPath: /var/lib/docker/containers
        volumes:
          - name: varlogcontainers
            hostPath:
              path: /var/log/containers
          - name: varlogpods
            hostPath:
              path: /var/log/pods
          - name: varlibdockercontainers
            hostPath:
              path: /var/lib/docker/containers

  config:
    filebeat.inputs:
      - type: container
        paths:
          - /var/log/containers/*.log
        processors:
          - add_kubernetes_metadata:
              host: ${NODE_NAME}
              matchers:
                - logs_path:
                    logs_path: "/var/log/containers/"

    output.logstash:
      hosts: ["quetxal-ls-beats.observability.svc:5044"]

---
# ServiceAccount para permisos de lectura de metadata de pods
apiVersion: v1
kind: ServiceAccount
metadata:
  name: quetxal-filebeat
  namespace: observability
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: quetxal-filebeat
rules:
  - apiGroups: [""]
    resources: ["namespaces", "pods", "nodes"]
    verbs: ["get", "watch", "list"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: quetxal-filebeat
subjects:
  - kind: ServiceAccount
    name: quetxal-filebeat
    namespace: observability
roleRef:
  kind: ClusterRole
  name: quetxal-filebeat
  apiGroup: rbac.authorization.k8s.io
