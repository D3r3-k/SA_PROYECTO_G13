---
apiVersion: logstash.k8s.elastic.co/v1alpha1
kind: Logstash
metadata:
  name: quetxal
  namespace: observability
spec:
  version: 9.4.2
  count: 1
  # Imagen personalizada con driver PostgreSQL JDBC
  # El tag se reemplaza en CI con el SHA del commit
  image: ghcr.io/d3r3-k/sa_proyecto_g13/logstash-jdbc:__LOGSTASH_TAG__
  imagePullSecrets:
    - name: ghcr-pull-secret-observability
  elasticsearchRefs:
    - name: quetxal
      clusterName: quetxal

  # Pipelines declarados como configRef
  pipelines:
    - pipeline.id: container-logs
      config.string: |
        input {
          beats {
            port => 5044
          }
        }
        filter {
          mutate {
            add_field => { "[@metadata][index_prefix]" => "logs-quetxal" }
          }
        }
        output {
          elasticsearch {
            hosts => ["https://quetxal-es-http.observability.svc:9200"]
            user => "${ELASTICSEARCH_USERNAME}"
            password => "${ELASTICSEARCH_PASSWORD}"
            ssl_certificate_verification => false
            index => "logs-quetxal-%{+YYYY.MM.dd}"
            ilm_enabled => false
          }
        }
    - pipeline.id: database-audit
      config.string: |
        input {
          # identity audit_log
          jdbc {
            jdbc_driver_library => "/usr/share/logstash/vendor/jar/jdbc/postgresql-42.7.3.jar"
            jdbc_driver_class => "org.postgresql.Driver"
            jdbc_connection_string => "jdbc:postgresql://${CLOUD_SQL_IP}:5432/identity_db"
            jdbc_user => "identity_user"
            jdbc_password => "${IDENTITY_DB_PASSWORD}"
            jdbc_paging_enabled => true
            tracking_column => "id"
            tracking_column_type => "numeric"
            use_column_value => true
            last_run_metadata_path => "/usr/share/logstash/data/jdbc_identity_last_run"
            schedule => "*/5 * * * *"
            statement => "SELECT id, user_id, action AS event_action, old_state AS audit_old_state, new_state AS audit_new_state, created_at FROM audit_log WHERE id > :sql_last_value ORDER BY id ASC"
            add_field => {
              "service.name" => "identity"
              "[@metadata][doc_id_prefix]" => "identity"
            }
          }
          # catalog audit_log
          jdbc {
            jdbc_driver_library => "/usr/share/logstash/vendor/jar/jdbc/postgresql-42.7.3.jar"
            jdbc_driver_class => "org.postgresql.Driver"
            jdbc_connection_string => "jdbc:postgresql://${CLOUD_SQL_IP}:5432/catalog_db"
            jdbc_user => "catalog_user"
            jdbc_password => "${CATALOG_DB_PASSWORD}"
            jdbc_paging_enabled => true
            tracking_column => "id"
            tracking_column_type => "numeric"
            use_column_value => true
            last_run_metadata_path => "/usr/share/logstash/data/jdbc_catalog_last_run"
            schedule => "*/5 * * * *"
            statement => "SELECT id, user_id, action AS event_action, old_state AS audit_old_state, new_state AS audit_new_state, created_at FROM audit_log WHERE id > :sql_last_value ORDER BY id ASC"
            add_field => {
              "service.name" => "catalog"
              "[@metadata][doc_id_prefix]" => "catalog"
            }
          }
          # subscription audit_log
          jdbc {
            jdbc_driver_library => "/usr/share/logstash/vendor/jar/jdbc/postgresql-42.7.3.jar"
            jdbc_driver_class => "org.postgresql.Driver"
            jdbc_connection_string => "jdbc:postgresql://${CLOUD_SQL_IP}:5432/subscription_db"
            jdbc_user => "subscription_user"
            jdbc_password => "${SUBSCRIPTION_DB_PASSWORD}"
            jdbc_paging_enabled => true
            tracking_column => "id"
            tracking_column_type => "numeric"
            use_column_value => true
            last_run_metadata_path => "/usr/share/logstash/data/jdbc_subscription_last_run"
            schedule => "*/5 * * * *"
            statement => "SELECT id, user_id, action AS event_action, old_state AS audit_old_state, new_state AS audit_new_state, created_at FROM audit_log WHERE id > :sql_last_value ORDER BY id ASC"
            add_field => {
              "service.name" => "subscription"
              "[@metadata][doc_id_prefix]" => "subscription"
            }
          }
          # engagement audit_log
          jdbc {
            jdbc_driver_library => "/usr/share/logstash/vendor/jar/jdbc/postgresql-42.7.3.jar"
            jdbc_driver_class => "org.postgresql.Driver"
            jdbc_connection_string => "jdbc:postgresql://${CLOUD_SQL_IP}:5432/engagement_db"
            jdbc_user => "engagement_user"
            jdbc_password => "${ENGAGEMENT_DB_PASSWORD}"
            jdbc_paging_enabled => true
            tracking_column => "id"
            tracking_column_type => "numeric"
            use_column_value => true
            last_run_metadata_path => "/usr/share/logstash/data/jdbc_engagement_last_run"
            schedule => "*/5 * * * *"
            statement => "SELECT id, user_id, action AS event_action, old_state AS audit_old_state, new_state AS audit_new_state, created_at FROM audit_log WHERE id > :sql_last_value ORDER BY id ASC"
            add_field => {
              "service.name" => "engagement"
              "[@metadata][doc_id_prefix]" => "engagement"
            }
          }
        }
        filter {
          date {
            match => ["created_at", "ISO8601"]
            target => "@timestamp"
          }
          mutate {
            remove_field => ["created_at"]
          }
        }
        output {
          elasticsearch {
            hosts => ["https://quetxal-es-http.observability.svc:9200"]
            user => "${ELASTICSEARCH_USERNAME}"
            password => "${ELASTICSEARCH_PASSWORD}"
            ssl_certificate_verification => false
            index => "audit-quetxal-%{+YYYY.MM.dd}"
            document_id => "%{[@metadata][doc_id_prefix]}-%{id}"
            ilm_enabled => false
          }
        }

  services:
    - name: beats
      service:
        spec:
          type: ClusterIP
          ports:
            - name: beats
              port: 5044
              protocol: TCP
              targetPort: 5044

  volumeClaimTemplates:
    - metadata:
        name: logstash-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 2Gi
        storageClassName: standard-rwo

  podTemplate:
    spec:
      nodeSelector:
        workload: observability
      tolerations:
        - key: workload
          value: observability
          effect: NoSchedule
      containers:
        - name: logstash
          resources:
            requests:
              memory: 1Gi
              cpu: "250m"
            limits:
              memory: 2Gi
              cpu: "1"
          env:
            - name: CLOUD_SQL_IP
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: CLOUD_SQL_IP
            - name: IDENTITY_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: IDENTITY_DB_PASSWORD
            - name: CATALOG_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: CATALOG_DB_PASSWORD
            - name: SUBSCRIPTION_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: SUBSCRIPTION_DB_PASSWORD
            - name: ENGAGEMENT_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: ENGAGEMENT_DB_PASSWORD
