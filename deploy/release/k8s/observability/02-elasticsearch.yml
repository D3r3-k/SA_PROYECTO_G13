---
apiVersion: elasticsearch.k8s.elastic.co/v1
kind: Elasticsearch
metadata:
  name: quetxal
  namespace: observability
spec:
  version: 9.4.2
  nodeSets:
    - name: default
      count: 1
      config:
        # Requerido en entornos sin vm.max_map_count configurado (GKE)
        node.store.allow_mmap: false
        xpack.security.enabled: true
        xpack.security.transport.ssl.enabled: true
        xpack.security.http.ssl.enabled: false
      podTemplate:
        spec:
          nodeSelector:
            workload: observability
          tolerations:
            - key: workload
              value: observability
              effect: NoSchedule
          containers:
            - name: elasticsearch
              resources:
                requests:
                  memory: 2Gi
                  cpu: "500m"
                limits:
                  memory: 3Gi
                  cpu: "2"
              env:
                - name: ES_JAVA_OPTS
                  value: "-Xms1g -Xmx1g"
      volumeClaimTemplates:
        - metadata:
            name: elasticsearch-data
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 20Gi
            storageClassName: standard-rwo
