apiVersion: apps/v1
kind: Deployment
metadata:
  name: engagement-service
  namespace: quetxal-tv-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: engagement-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: engagement-service
    spec:
      imagePullSecrets:
      - name: ghcr-pull-secret
      containers:
      - name: engagement-service
        image: ghcr.io/d3r3-k/sa_proyecto_g13/engagement-service:latest
        ports:
        - containerPort: 50056
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: connection-secrets
              key: ENGAGEMENT_DATABASE_URL
        envFrom:
        - configMapRef:
            name: app-config
        - secretRef:
            name: app-secrets
        - secretRef:
            name: connection-secrets
        readinessProbe:
          tcpSocket:
            port: 50056
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 50056
          initialDelaySeconds: 30
          periodSeconds: 20
