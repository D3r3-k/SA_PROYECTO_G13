apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommendation-service
  namespace: quetxal-tv-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: recommendation-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: recommendation-service
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: recommendation-service
          image: ghcr.io/d3r3-k/sa_proyecto_g13/recommendation-service:latest
          ports:
            - containerPort: 50058
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          readinessProbe:
            tcpSocket:
              port: 50058
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 50058
            initialDelaySeconds: 30
            periodSeconds: 20
