apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
  namespace: quetxal-tv-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identity-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: identity-service
    spec:
      imagePullSecrets:
      - name: ghcr-pull-secret
      containers:
      - name: identity-service
        image: ghcr.io/d3r3-k/sa_proyecto_g13/identity-service:latest
        ports:
        - containerPort: 50051
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: IDENTITY_DB_PASSWORD
        envFrom:
        - configMapRef:
            name: app-config
        - secretRef:
            name: app-secrets
        - secretRef:
            name: connection-secrets
        readinessProbe:
          tcpSocket:
            port: 50051
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 50051
          initialDelaySeconds: 30
          periodSeconds: 20
