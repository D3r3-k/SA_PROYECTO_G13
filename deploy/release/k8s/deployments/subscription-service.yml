apiVersion: apps/v1
kind: Deployment
metadata:
  name: subscription-service
  namespace: quetxal-tv-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: subscription-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: subscription-service
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: subscription-service
          image: ghcr.io/d3r3-k/sa_proyecto_g13/subscription-service:latest
          ports:
            - containerPort: 50053
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: connection-secrets
                  key: SUBSCRIPTION_DATABASE_URL
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
            - secretRef:
                name: connection-secrets
          readinessProbe:
            tcpSocket:
              port: 50053
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 50053
            initialDelaySeconds: 30
            periodSeconds: 20
