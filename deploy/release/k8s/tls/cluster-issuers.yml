apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-ip-staging
spec:
  acme:
    email: __ACME_EMAIL__
    profile: shortlived
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-ip-staging-account
    solvers:
      - http01:
          ingress:
            class: "cert-manager-internal"
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-ip-production
spec:
  acme:
    email: __ACME_EMAIL__
    profile: shortlived
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-ip-production-account
    solvers:
      - http01:
          ingress:
            class: "cert-manager-internal"
