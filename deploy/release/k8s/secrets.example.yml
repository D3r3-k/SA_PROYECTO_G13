apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: quetxal-tv-prod
type: Opaque
stringData:
  JWT_SECRET: "YOUR_JWT_SECRET"
  IDENTITY_DB_PASSWORD: "YOUR_DB_PASSWORD"
  SUBSCRIPTION_DB_PASSWORD: "YOUR_DB_PASSWORD"
  CATALOG_DB_PASSWORD: "YOUR_DB_PASSWORD"
  ENGAGEMENT_DB_PASSWORD: "YOUR_DB_PASSWORD"
  SMTP_HOST: "YOUR_SMTP_HOST"
  SMTP_USERNAME: "YOUR_SMTP_USERNAME"
  SMTP_PASSWORD: "YOUR_SMTP_PASSWORD"
  SMTP_FROM: "YOUR_SMTP_FROM"
---
apiVersion: v1
kind: Secret
metadata:
  name: connection-secrets
  namespace: quetxal-tv-prod
type: Opaque
stringData:
  SUBSCRIPTION_DATABASE_URL: "postgresql://subscription_user:PASSWORD@IP:5432/subscription_db"
  CATALOG_DATABASE_URL: "postgresql://catalog_user:PASSWORD@IP:5432/catalog_db"
  ENGAGEMENT_DATABASE_URL: "postgresql://engagement_user:PASSWORD@IP:5432/engagement_db"
