syntax = "proto3";

package identity;

service IdentityService {
  rpc RegisterUser(RegisterUserRequest) returns (AuthResponse);
  rpc Login(LoginRequest) returns (AuthResponse);
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
  rpc GetUserById(GetUserByIdRequest) returns (UserResponse);

  rpc CreateProfile(CreateProfileRequest) returns (ProfileResponse);
  rpc ListProfiles(ListProfilesRequest) returns (ListProfilesResponse);
  rpc SelectProfile(SelectProfileRequest) returns (SelectProfileResponse);

  rpc UpdateCredentials(UpdateCredentialsRequest) returns (BasicResponse);

  rpc UpdateProfile(UpdateProfileRequest) returns (ProfileResponse);
  rpc DeleteProfile(DeleteProfileRequest) returns (BasicResponse);
  
  rpc VerifyParentalPin(VerifyParentalPinRequest) returns (BasicResponse);

  rpc ListAuditLogs(ListAuditLogsRequest) returns (ListAuditLogsResponse);
}

message RegisterUserRequest {
  string email = 1;
  string password = 2;
  string full_name = 3;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message AuthResponse {
  bool success = 1;
  string message = 2;
  string user_id = 3;
  string token = 4;
  repeated string roles = 5;
  repeated string permissions = 6;
  bool is_admin = 7;
}

message GetUserByIdRequest {
  string user_id = 1;
}

message UserResponse {
  bool success = 1;
  string message = 2;
  string user_id = 3;
  string email = 4;
  string full_name = 5;
  repeated string roles = 6;
  repeated string permissions = 7;
  bool is_admin = 8;
}

message ValidateTokenRequest {
  string token = 1;
}

message ValidateTokenResponse {
  bool valid = 1;
  string user_id = 2;
  string email = 3;
  string profile_id = 4;
  repeated string roles = 5;
  repeated string permissions = 6;
  bool is_admin = 7;
  bool profile_is_child = 8;
  bool parental_pin_configured = 9;
}

message CreateProfileRequest {
  string user_id = 1;
  string name = 2;
  string avatar_url = 3;
  bool is_child = 4;
  string parental_pin = 5;
}

message ListProfilesRequest {
  string user_id = 1;
}

message ListProfilesResponse {
  repeated ProfileResponse profiles = 1;
}

message SelectProfileRequest {
  string user_id = 1;
  string profile_id = 2;
}

message ProfileResponse {
  bool success = 1;
  string message = 2;
  string profile_id = 3;
  string user_id = 4;
  string name = 5;
  string avatar_url = 6;
  bool is_child = 7;
  bool parental_pin_configured = 8;
}

message SelectProfileResponse {
  bool success = 1;
  string message = 2;
  string profile_id = 3;
  string user_id = 4;
  string name = 5;
  string avatar_url = 6;
  string token = 7;
  repeated string roles = 8;
  repeated string permissions = 9;
  bool is_admin = 10;
  bool profile_is_child = 11;
  bool parental_pin_configured = 12;
}

message UpdateProfileRequest {
  string user_id = 1;
  string profile_id = 2;
  string name = 3;
  string avatar_url = 4;
  bool is_child = 5;
  string parental_pin = 6;
}

message DeleteProfileRequest {
  string user_id = 1;
  string profile_id = 2;
}

message VerifyParentalPinRequest {
  string user_id = 1;
  string profile_id = 2;
  string pin = 3;
}

message UpdateCredentialsRequest {
  string user_id = 1;
  string current_password = 2;
  string new_password = 3;
}

message BasicResponse {
  bool success = 1;
  string message = 2;
}

message AuditLogItem {
  string service = 1;
  string audit_id = 2;
  string actor_user_id = 3;
  string actor_email = 4;
  string action = 5;
  string table_name = 6;
  string record_id = 7;
  string old_state_json = 8;
  string new_state_json = 9;
  string created_at = 10;
}

message ListAuditLogsRequest {
  string table_name = 1;
  string actor_user_id = 2;
  string action = 3;
  string from = 4;
  string to = 5;
  int32 limit = 6;
  int32 offset = 7;
}

message ListAuditLogsResponse {
  bool success = 1;
  string message = 2;
  repeated AuditLogItem items = 3;
}
