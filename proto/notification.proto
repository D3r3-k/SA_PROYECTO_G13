syntax = "proto3";
package notification;

import "google/protobuf/struct.proto";

service Notification {
  rpc Send (NotifyRequest) returns (NotifyResponse) {}
}

message NotifyRequest {
  // Campos históricos mantenidos para compatibilidad.
  string to = 1;
  string subject = 2;
  string body = 3;

  // Campos añadidos por el equipo para soportar eventos internos.
  // Valores típicos: "registration", "purchase", "content-publication", "alert".
  string type = 4;
  string user_id = 5;
  string email = 6;

  // Metadatos arbitrarios para extensibilidad (por ejemplo: plan, content_id, cta_url).
  google.protobuf.Struct metadata = 7;
}

message NotifyResponse {
  bool accepted = 1;
  // Identificador opcional de mensaje generado por el sistema.
  string message_id = 2;
}
