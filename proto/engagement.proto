syntax = "proto3";

package engagement;

import "google/protobuf/timestamp.proto";

service EngagementService {
  rpc RateContent(RateContentRequest) returns (RateContentResponse);
  rpc GetContentRatingSummary(GetContentRatingSummaryRequest) returns (GetContentRatingSummaryResponse);
  rpc SaveProgress(SaveProgressRequest) returns (SaveProgressResponse);
  rpc GetRecentHistory(GetRecentHistoryRequest) returns (GetRecentHistoryResponse);
  rpc ResumeContent(ResumeContentRequest) returns (ResumeContentResponse);
  rpc ListAuditLogs(ListAuditLogsRequest) returns (ListAuditLogsResponse);
}

enum RatingValue {
  RATING_VALUE_UNSPECIFIED = 0;
  THUMBS_DOWN = 1;
  THUMBS_UP = 2;
}

message RateContentRequest {
  string profile_id = 1;
  string content_id = 2;
  RatingValue rating = 3;
}

message RateContentResponse {
  bool success = 1;
  string message = 2;
}

message GetContentRatingSummaryRequest {
  string content_id = 1;
}

message GetContentRatingSummaryResponse {
  string content_id = 1;
  int32 total_ratings = 2;
  int32 thumbs_up_count = 3;
  int32 thumbs_down_count = 4;
  double recommendation_percentage = 5;
}

message SaveProgressRequest {
  string profile_id = 1;
  string content_id = 2;
  int32 season_number = 3;
  int32 episode_number = 4;
  int32 minute = 5;
}

message SaveProgressResponse {
  bool success = 1;
  string message = 2;
}

message GetRecentHistoryRequest {
  string profile_id = 1;
  int32 limit = 2;
}

message HistoryItem {
  string profile_id = 1;
  string content_id = 2;
  int32 season_number = 3;
  int32 episode_number = 4;
  int32 minute = 5;
  google.protobuf.Timestamp updated_at = 6;
}

message GetRecentHistoryResponse {
  repeated HistoryItem items = 1;
}

message ResumeContentRequest {
  string profile_id = 1;
  string content_id = 2;
}

message ResumeContentResponse {
  bool found = 1;
  string profile_id = 2;
  string content_id = 3;
  int32 season_number = 4;
  int32 episode_number = 5;
  int32 minute = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message AuditLogItem {
  string service = 1;
  string audit_id = 2;
  string actor_user_id = 3;
  string actor_email = 4;
  string action = 5;
  string table_name = 6;
  string record_id = 7;
  string old_state_json = 8;
  string new_state_json = 9;
  string created_at = 10;
}

message ListAuditLogsRequest {
  string table_name = 1;
  string actor_user_id = 2;
  string action = 3;
  string from = 4;
  string to = 5;
  int32 limit = 6;
  int32 offset = 7;
}

message ListAuditLogsResponse {
  bool success = 1;
  string message = 2;
  repeated AuditLogItem items = 3;
}
