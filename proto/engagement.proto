syntax = "proto3";

package engagement;

service EngagementService {
  rpc RateContent(RateContentRequest) returns (RateContentResponse);
  rpc GetContentRatingSummary(GetContentRatingSummaryRequest) returns (GetContentRatingSummaryResponse);
  rpc GetRecommendationPercentage(GetRecommendationPercentageRequest) returns (GetRecommendationPercentageResponse);

  rpc SaveProgress(SaveProgressRequest) returns (SaveProgressResponse);
  rpc GetRecentHistory(GetRecentHistoryRequest) returns (GetRecentHistoryResponse);
  rpc ResumeContent(ResumeContentRequest) returns (ResumeContentResponse);
}

message RateContentRequest {
  string profile_id = 1;
  string content_id = 2;
  // Tomar en cuenta 1 si 0 no pulgar arriba/abajo
  int32 rating = 3;
}

message RateContentResponse {
  bool success = 1;
  string message = 2;
}

message GetContentRatingSummaryRequest {
  string content_id = 1;
}

message GetContentRatingSummaryResponse {
  string content_id = 1;
  double average_rating = 2;
  int32 total_ratings = 3;
}

message GetRecommendationPercentageRequest {
  string content_id = 1;
}

message GetRecommendationPercentageResponse {
  string content_id = 1;
  double recommendation_percentage = 2;
}

message SaveProgressRequest {
  string profile_id = 1;
  string content_id = 2;
  int32 season_number = 3;
  int32 episode_number = 4;
  int32 minute = 5;
}

message SaveProgressResponse {
  bool success = 1;
  string message = 2;
}

message GetRecentHistoryRequest {
  string profile_id = 1;
  int32 limit = 2;
}

message HistoryItem {
  string profile_id = 1;
  string content_id = 2;
  int32 season_number = 3;
  int32 episode_number = 4;
  int32 minute = 5;
  string updated_at = 6;
}

message GetRecentHistoryResponse {
  repeated HistoryItem items = 1;
}

message ResumeContentRequest {
  string profile_id = 1;
  string content_id = 2;
}

message ResumeContentResponse {
  bool found = 1;
  string profile_id = 2;
  string content_id = 3;
  int32 season_number = 4;
  int32 episode_number = 5;
  int32 minute = 6;
  string updated_at = 7;
}