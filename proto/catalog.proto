syntax = "proto3";

package catalog;

service CatalogService {
  rpc Health(CatalogHealthRequest) returns (CatalogHealthResponse);
  rpc SyncMinimumCatalog(SyncMinimumCatalogRequest) returns (SyncMinimumCatalogResponse);
  rpc ListContent(ListContentRequest) returns (ListContentResponse);
  rpc SearchContent(SearchContentRequest) returns (ListContentResponse);
  rpc GetContentDetail(GetContentDetailRequest) returns (ContentDetailResponse);
  rpc ListEpisodes(ListEpisodesRequest) returns (ListEpisodesResponse);
  rpc ListAdminContent(ListAdminContentRequest) returns (ListContentResponse);
  rpc CreateContent(CreateContentRequest) returns (CreateContentResponse);
  rpc UpdateContent(UpdateContentRequest) returns (BasicCatalogResponse);
  rpc DeleteContent(DeleteContentRequest) returns (BasicCatalogResponse);
  rpc SchedulePremiere(SchedulePremiereRequest) returns (BasicCatalogResponse);
  rpc GenerateUploadUrl(GenerateUploadUrlRequest) returns (GenerateUploadUrlResponse);
  rpc ConfirmMedia(ConfirmMediaRequest) returns (BasicCatalogResponse);
  rpc ListAuditLogs(ListAuditLogsRequest) returns (ListAuditLogsResponse);
}

message CatalogHealthRequest {}

message CatalogHealthResponse {
  bool success = 1;
  string status = 2;
  bool database = 3;
}

message SyncMinimumCatalogRequest { bool force = 1; }

message SyncMinimumCatalogResponse {
  bool success = 1;
  string message = 2;
  int32 contents_synced = 3;
  int32 episodes_synced = 4;
  string provider = 5;
}

message ListContentRequest {
  string type = 1;
  string genre = 2;
  int32 limit = 3;
  int32 offset = 4;
}

message SearchContentRequest {
  string query = 1;
  string type = 2;
  string genre = 3;
  int32 limit = 4;
  int32 offset = 5;
}

message ListAdminContentRequest {
  string type = 1;
  string status = 2;
  string query = 3;
  int32 limit = 4;
  int32 offset = 5;
}

message GetContentDetailRequest { string content_id = 1; }

message ListEpisodesRequest {
  string content_id = 1;
  int32 season_number = 2;
}

message Genre { string name = 1; }

message CastMember {
  string actor_name = 1;
  string character_name = 2;
  int32 order_index = 3;
}

message ContentCard {
  string content_id = 1;
  string external_id = 2;
  string type = 3;
  string title = 4;
  string overview = 5;
  string poster_path = 6;
  string release_date = 7;
  repeated Genre genres = 8;
  string media_url = 9;
  string media_mime_type = 10;
  string source_page_url = 11;
  int32 seasons_count = 12;
  int32 episodes_count = 13;
  string available_from = 14;
  string deleted_at = 15;
}

message ContentDetailResponse {
  bool success = 1;
  string message = 2;
  ContentCard content = 3;
  repeated CastMember cast = 4;
  int32 seasons_count = 5;
  int32 episodes_count = 6;
}

message ListContentResponse {
  bool success = 1;
  string message = 2;
  repeated ContentCard items = 3;
}

message Episode {
  string episode_id = 1;
  string content_id = 2;
  int32 season_number = 3;
  int32 episode_number = 4;
  string title = 5;
  string overview = 6;
  int32 runtime_minutes = 7;
  string media_url = 8;
  string media_mime_type = 9;
}

message ListEpisodesResponse {
  bool success = 1;
  string message = 2;
  repeated Episode episodes = 3;
}

message AdminCastInput {
  string actor_name = 1;
  string character_name = 2;
  int32 order_index = 3;
}

message AdminEpisodeInput {
  int32 season_number = 1;
  int32 episode_number = 2;
  string title = 3;
  string overview = 4;
  int32 runtime_minutes = 5;
}

message CreateContentRequest {
  string type = 1;
  string title = 2;
  string overview = 3;
  string release_date = 4;
  repeated string genres = 5;
  repeated AdminCastInput cast = 6;
  repeated AdminEpisodeInput episodes = 7;
  string available_from = 8;
  string actor_user_id = 9;
  string actor_email = 10;
}

message UpdateContentRequest {
  string content_id = 1;
  string title = 2;
  string overview = 3;
  string release_date = 4;
  repeated string genres = 5;
  repeated AdminCastInput cast = 6;
  repeated AdminEpisodeInput episodes = 7;
  string available_from = 8;
  string actor_user_id = 9;
  string actor_email = 10;
  string type = 11;
}

message DeleteContentRequest {
  string content_id = 1;
  string actor_user_id = 2;
  string actor_email = 3;
}

message SchedulePremiereRequest {
  string content_id = 1;
  string available_from = 2;
  string actor_user_id = 3;
  string actor_email = 4;
}

message CreatedEpisode {
  string episode_id = 1;
  int32 season_number = 2;
  int32 episode_number = 3;
  string title = 4;
}

message CreateContentResponse {
  bool success = 1;
  string message = 2;
  string content_id = 3;
  repeated CreatedEpisode episodes = 4;
}

message GenerateUploadUrlRequest {
  string content_id = 1;
  string episode_id = 2;
  string media_type = 3;
  string file_name = 4;
  string content_type = 5;
  int64 size_bytes = 6;
}

message GenerateUploadUrlResponse {
  bool success = 1;
  string message = 2;
  string upload_url = 3;
  string object_key = 4;
  int32 expires_in_minutes = 5;
}

message ConfirmMediaRequest {
  string content_id = 1;
  string episode_id = 2;
  string media_type = 3;
  string object_key = 4;
  string content_type = 5;
  string actor_user_id = 6;
  string actor_email = 7;
}

message BasicCatalogResponse {
  bool success = 1;
  string message = 2;
}

message AuditLogItem {
  string service = 1;
  string audit_id = 2;
  string actor_user_id = 3;
  string actor_email = 4;
  string action = 5;
  string table_name = 6;
  string record_id = 7;
  string old_state_json = 8;
  string new_state_json = 9;
  string created_at = 10;
}

message ListAuditLogsRequest {
  string table_name = 1;
  string actor_user_id = 2;
  string action = 3;
  string from = 4;
  string to = 5;
  int32 limit = 6;
  int32 offset = 7;
}

message ListAuditLogsResponse {
  bool success = 1;
  string message = 2;
  repeated AuditLogItem items = 3;
}
