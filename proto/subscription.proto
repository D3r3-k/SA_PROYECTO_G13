syntax = "proto3";

package subscription;

service SubscriptionService {
  rpc Health (SubscriptionHealthRequest) returns (SubscriptionHealthResponse);
  rpc ListPlans (ListPlansRequest) returns (ListPlansResponse);
  rpc UpdatePlan (UpdatePlanRequest) returns (UpdatePlanResponse);
  rpc CreateSubscription (CreateSubscriptionRequest) returns (SubscriptionResponse);
  rpc UpdateSubscription (UpdateSubscriptionRequest) returns (SubscriptionResponse);
  rpc ListUserSubscriptions (ListUserSubscriptionsRequest) returns (ListUserSubscriptionsResponse);
  rpc CancelSubscription (CancelSubscriptionRequest) returns (BasicSubscriptionResponse);
  rpc ListAuditLogs(ListAuditLogsRequest) returns (ListAuditLogsResponse);
}

message SubscriptionHealthRequest {}

message SubscriptionHealthResponse {
  bool success = 1;
  string status = 2;
  bool database = 3;
}

message ListPlansRequest {}

message UpdatePlanRequest {
  int32 id = 1;
  string name = 2;
  double price_usd = 3;
  string actor_user_id = 4;
  string actor_email = 5;
}

message UpdatePlanResponse {
  bool success = 1;
  string message = 2;
  Plan plan = 3;
}

message Plan {
  int32 id = 1;
  string name = 2;
  double price_usd = 3;
  bool is_active = 4;
}

message ListPlansResponse {
  bool success = 1;
  string message = 2;
  repeated Plan plans = 3;
}

message CreateSubscriptionRequest {
  string user_id = 1;
  int32 plan_id = 2;
  string email = 3;
}

message UpdateSubscriptionRequest {
  int32 subscription_id = 1;
  int32 plan_id = 2;
  string user_id = 3;
  string email = 4;
}

message ListUserSubscriptionsRequest {
  string user_id = 1;
}

message CancelSubscriptionRequest {
  int32 subscription_id = 1;
}

message Subscription {
  int32 id = 1;
  string user_id = 2;
  int32 plan_id = 3;
  string plan_name = 4;
  double price_usd = 5;
  string status = 6;
  string started_at = 7;
  string updated_at = 8;
}

message SubscriptionResponse {
  bool success = 1;
  string message = 2;
  Subscription subscription = 3;
}

message ListUserSubscriptionsResponse {
  bool success = 1;
  string message = 2;
  repeated Subscription subscriptions = 3;
}

message BasicSubscriptionResponse {
  bool success = 1;
  string message = 2;
  int32 subscription_id = 3;
}

message AuditLogItem {
  string service = 1;
  string audit_id = 2;
  string actor_user_id = 3;
  string actor_email = 4;
  string action = 5;
  string table_name = 6;
  string record_id = 7;
  string old_state_json = 8;
  string new_state_json = 9;
  string created_at = 10;
}

message ListAuditLogsRequest {
  string table_name = 1;
  string actor_user_id = 2;
  string action = 3;
  string from = 4;
  string to = 5;
  int32 limit = 6;
  int32 offset = 7;
}

message ListAuditLogsResponse {
  bool success = 1;
  string message = 2;
  repeated AuditLogItem items = 3;
}
