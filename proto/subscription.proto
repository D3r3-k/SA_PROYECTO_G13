syntax = "proto3";
package subscription;

service Subscription {
  rpc ListPlans (Empty) returns (PlanList) {}
}

message Empty {}

message Plan {
  string id = 1;
  string name = 2;
  double price_usd = 3;
}

message PlanList {
  repeated Plan plans = 1;
}

// Evento emitido por el servicio de suscripciones cuando una suscripción cambia de estado.
message SubscriptionEvent {
  string subscription_id = 10;
  string user_id = 11;
  string plan_id = 12;
  string action = 13; // created | updated | cancelled
  int64 timestamp = 14;
}
